[package]
name = "origin-provider"
description = "Provider trait with canonical request/response/usage/error types for origin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
origin-core = { path = "../origin-core" }
origin-stream = { path = "../origin-stream" }
origin-cas = { path = "../origin-cas" }
origin-multimodal = { path = "../origin-multimodal" }
origin-replay = { path = "../origin-replay", optional = true }
async-stream = "0.3"
async-trait = "0.1"
eventsource-stream = "0.2"
futures-util = "0.3"
parking_lot = "0.12"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "rustls-tls-native-roots", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio-util = { version = "0.7", features = ["io"] }
toml = "0.8"

[features]
recorder = ["dep:origin-replay"]

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
url = "2"
