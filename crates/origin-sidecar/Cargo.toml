[package]
name = "origin-sidecar"
description = "Always-on small-model worker with a bounded queue and pooled workers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
origin-core = { path = "../origin-core" }
origin-provider = { path = "../origin-provider" }
origin-cas = { path = "../origin-cas" }
async-trait = "0.1"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time", "macros", "rt", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
mockall = "0.14"
tokio = { version = "1", features = ["macros", "rt", "test-util", "time"] }
