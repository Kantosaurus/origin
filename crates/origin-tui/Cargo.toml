[package]
name = "origin-tui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# Override workspace `unsafe_code = "forbid"` — P4.2 needs `wide::u8x32`
# intrinsic dispatch. Each unsafe block must carry a SAFETY: comment.
# Cargo forbids combining `[lints] workspace = true` with per-section
# overrides, so we inline the workspace clippy lints here too.
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery  = { level = "warn", priority = -1 }
unwrap_used = "deny"
panic = "warn"
undocumented_unsafe_blocks = "deny"

[dependencies]
thiserror = "1"
wide = "0.7"
tokio = { version = "1", features = ["sync", "time", "macros", "rt"] }
unicode-segmentation = "1"
unicode-width = "0.1"
lru = "0.12"
fxhash = "0.2"
origin-metrics = { path = "../origin-metrics" }
origin-stream = { path = "../origin-stream" }
origin-tools = { path = "../origin-tools" }
origin-permission = { path = "../origin-permission" }
origin-cas = { path = "../origin-cas" }
origin-plan = { path = "../origin-plan" }
async-trait = "0.1"
parking_lot = "0.12"
blake3 = "1"
rkyv = { version = "0.7", features = ["validation", "bytecheck"] }

[dev-dependencies]
proptest = { version = "=1.4.0", default-features = false, features = ["std"] }
criterion = "0.5"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "test-util", "time"] }
tempfile = "3"

[[bench]]
name = "damage_diff"
harness = false
