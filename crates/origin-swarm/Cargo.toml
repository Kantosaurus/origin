[package]
name = "origin-swarm"
description = "Coordinator/worker protocol with credit-channel backpressure and completion reports"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
origin-core = { path = "../origin-core" }
origin-plan = { path = "../origin-plan" }
origin-smr = { path = "../origin-smr" }
origin-cas = { path = "../origin-cas" }
origin-store = { path = "../origin-store" }
origin-planner = { path = "../origin-planner" }
origin-runtime = { path = "../origin-runtime" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
thiserror = "1"
serde = { version = "1", features = ["derive"] }
bincode = "1.3"
ulid = "1"

[dev-dependencies]
tempfile = "3"
