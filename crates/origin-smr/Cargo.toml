[package]
name = "origin-smr"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# Override workspace `unsafe_code = "forbid"` — the mmap + native FFI
# backends need raw pointers. Every `unsafe { ... }` block in this crate
# must carry a `// SAFETY:` comment. Cargo forbids combining
# `[lints] workspace = true` with per-section overrides, so we inline the
# workspace clippy lints here too.
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery  = { level = "warn", priority = -1 }
unwrap_used = "deny"
panic = "warn"
undocumented_unsafe_blocks = "deny"

[dependencies]
rkyv = { version = "0.7", features = ["validation"] }
crossbeam-utils = "0.8"
thiserror = "1"
bytecheck = "0.6"

[target.'cfg(unix)'.dependencies]
# `mman`: mmap/munmap/MapFlags/ProtFlags. `fs`: OFlag, Mode, ftruncate, and
# (in nix 0.29) shm_open/shm_unlink are gated behind `fs` too.
nix = { version = "0.29", features = ["mman", "fs"] }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_System_Memory",
    "Win32_Security",
] }
