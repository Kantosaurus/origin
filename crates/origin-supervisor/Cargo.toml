[package]
name = "origin-supervisor"
description = "Restarts origin-daemon on crash and resumes sessions across restarts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[lib]
name = "origin_supervisor"
path = "src/lib.rs"

[[bin]]
name = "origin-supervisor"
path = "src/main.rs"

# Test-only stand-in for `origin-daemon`, driven by the self-dev relaunch
# round-trip integration test (`tests/relaunch_e2e.rs`). `cargo` exposes its
# path to the test via `CARGO_BIN_EXE_selfdev-fixture-daemon`.
[[bin]]
name = "selfdev-fixture-daemon"
path = "tests/fixtures/selfdev_fixture_daemon.rs"
test = false
bench = false
doc = false

[dependencies]
origin-resume-token = { path = "../origin-resume-token" }
origin-ipc = { path = "../origin-ipc" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "signal", "time"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
which = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(unix)'.dependencies]
nix = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_System_JobObjects",
  "Win32_System_Threading",
  "Win32_Foundation",
] }

[dev-dependencies]
tempfile = "3"
