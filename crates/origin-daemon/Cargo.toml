[package]
name = "origin-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
origin-ipc              = { path = "../origin-ipc" }
origin-core             = { path = "../origin-core" }
origin-provider         = { path = "../origin-provider" }
origin-provider-anthropic = { path = "../origin-provider-anthropic" }
origin-tools            = { path = "../origin-tools" }
origin-permission       = { path = "../origin-permission" }
origin-store            = { path = "../origin-store" }
origin-cas              = { path = "../origin-cas" }
origin-stream           = { path = "../origin-stream" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net", "io-util", "sync"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
async-trait = "0.1"
thiserror   = "1"
rkyv        = { version = "0.7", features = ["validation", "bytecheck"] }
ulid        = "1"
rusqlite    = { version = "0.31", features = ["bundled"] }

[dev-dependencies]
tempfile = "3"

[lib]
name = "origin_daemon"
path = "src/lib.rs"

[[bin]]
name = "origin-daemon"
path = "src/main.rs"
