[package]
name = "origin-daemon-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
origin-cas = { path = "../../origin-cas" }
origin-daemon = { path = ".." }
origin-ipc = { path = "../../origin-ipc" }
origin-provider-anthropic = { path = "../../origin-provider-anthropic" }
origin-provider-openai = { path = "../../origin-provider-openai" }
origin-stream = { path = "../../origin-stream" }

[[bin]]
name = "tool_use_parser"
path = "fuzz_targets/tool_use_parser.rs"
test = false
doc = false

[[bin]]
name = "ipc_frame"
