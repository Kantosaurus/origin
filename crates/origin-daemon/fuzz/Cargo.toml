test = false
doc = false
bench = false

[[bin]]
name = "fastcdc_boundary"
path = "fuzz_targets/fastcdc_boundary.rs"
test = false
doc = false
bench = false

[[bin]]
name = "anthropic_stream"
path = "fuzz_targets/anthropic_stream.rs"
test = false
doc = false
bench = false

[[bin]]
name = "openai_stream"
path = "fuzz_targets/openai_stream.rs"
test = false
doc = false
bench = false

[[bin]]
