[package]
name = "origin-sandbox"
description = "Per-tool sandbox profiles for Linux, macOS, and Windows"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# Per-OS FFI lives here (landlock, seccompiler, windows-sys handle blocks);
# we override the workspace-default `unsafe_code = "forbid"` and require an
# explicit `// SAFETY:` comment on every unsafe block.
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
undocumented_unsafe_blocks = "deny"

[features]
default = []
linux = ["dep:landlock", "dep:seccompiler", "dep:caps", "dep:libc"]
macos = ["dep:libc"]
windows = []
# `no-sandbox` selects the noop backend on every host; used by integration tests
# that run the daemon under a debugger or in CI matrices that lack the kernel
# features required by a real backend.
no-sandbox = []

[dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = "1"
tracing = { workspace = true }

# The Linux-only optional crates (`landlock`, `seccompiler`, `caps`) FFI into
# kernel headers that only exist in `libc` when `target_os = "linux"`. Gating
# them under `[target.'cfg(target_os = "linux")'.dependencies]` lets
# `--all-features` resolve cleanly on every host: enabling `linux` on Windows
# is a no-op because Cargo never instantiates the optional deps off-target,
# and `lib.rs` already cfg-gates `backend_linux` behind the same predicate.
[target.'cfg(target_os = "linux")'.dependencies]
landlock = { workspace = true, optional = true }
seccompiler = { workspace = true, optional = true }
caps = { workspace = true, optional = true }
libc = { version = "0.2", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
libc = { version = "0.2", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61", features = [
  "Win32_Foundation",
  "Win32_Security",
  "Win32_System_Diagnostics_ToolHelp",
  "Win32_System_JobObjects",
  "Win32_System_Threading",
] }

[dev-dependencies]
tempfile = "3"
