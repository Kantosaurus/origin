[package]
name = "origin-tools"
description = "Tool registry, macros, and builtin tools for origin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
origin-core = { path = "../origin-core" }
origin-cas  = { path = "../origin-cas" }
origin-codegraph = { path = "../origin-codegraph" }
origin-plan = { path = "../origin-plan" }
origin-sandbox = { path = "../origin-sandbox" }
origin-swarm = { path = "../origin-swarm" }
origin-browser = { path = "../origin-browser" }
blake3 = "1"
hex = "0.4"
regex = "1"
globset.workspace = true
grep-matcher = "0.1"
grep-regex = "0.1"
grep-searcher = "0.1"
ignore = "0.4"
inventory = "0.3"
walkdir = "2"
async-trait = "0.1"
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "io-util", "fs", "sync"] }
encoding_rs  = { workspace = true }
pdf-extract  = { workspace = true }
image        = { workspace = true }
similar      = { workspace = true }
fs4          = "0.12"

[dev-dependencies]
origin-store = { path = "../origin-store" }
# Used only by the schema drift-guard tests in builtins/gmail.rs and
# builtins/author_workflow.rs: they assert the inlined `&'static str` schema
# literals parse to the exact `serde_json::Value` these crates produce. The
# tool registration itself uses only the string literals, so these are not
# build-time deps of the library.
origin-gmail = { path = "../origin-gmail" }
origin-workflowgen = { path = "../origin-workflowgen" }
tempfile = "3"
proptest = { workspace = true }
fs4 = "0.12"
