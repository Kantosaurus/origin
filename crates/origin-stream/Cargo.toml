[package]
name = "origin-stream"
description = "Single-producer multi-consumer byte ring with per-subscriber read cursors"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints.rust]
unsafe_code = "allow"   # raw cursor atomics

[lints.clippy]
undocumented_unsafe_blocks = "deny"

[dependencies]
bytes = "1"
rkyv = { version = "0.7", features = ["validation", "bytecheck"] }
tokio = { version = "1", features = ["sync"] }
thiserror = "2"
parking_lot = "0.12"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "test-util", "time", "sync"] }
