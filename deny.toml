# cargo-deny configuration — supply-chain policy for the origin workspace.
# Run locally with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[graph]
# Check the platforms we actually ship (see .github/workflows/release.yml).
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]
all-features = true

# ---------------------------------------------------------------------------
# Security advisories (RUSTSEC). This is the highest-value gate.
# ---------------------------------------------------------------------------
[advisories]
version = 2
yanked = "deny"
# Add RUSTSEC ids here only with a justification comment if a fix is unavailable.
ignore = []

# ---------------------------------------------------------------------------
# License policy. Enforced as a non-blocking check in CI for now (see
# audit.yml) until the allow-list / clarifications are tuned against the full
# dependency graph; then flip it to a hard gate.
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]
exceptions = []

# Some crypto crates (notably `ring`) carry their license in a file rather than
# an SPDX expression and need a `[[licenses.clarify]]` block with the correct
# `license-files` hash before the licenses check can resolve them. Add one after
# running `cargo deny check licenses` locally to read off the expected hash, then
# drop `continue-on-error` for the licenses step in .github/workflows/audit.yml.

# ---------------------------------------------------------------------------
# Dependency bans. Codify the rustls-only TLS policy that is otherwise enforced
# only by comments in Cargo.toml (no openssl-sys / native-tls in the tree).
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
    { name = "openssl-sys", reason = "origin is rustls-only; native-tls/openssl breaks the musl/cross builds" },
    { name = "openssl" },
    { name = "native-tls", reason = "use rustls instead" },
]

# ---------------------------------------------------------------------------
# Source allow-list: crates.io only.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
