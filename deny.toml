# cargo-deny configuration — supply-chain policy for the origin workspace.
# Run locally with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[graph]
# Check the platforms we actually ship (see .github/workflows/release.yml).
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]
all-features = true

# ---------------------------------------------------------------------------
# Security advisories (RUSTSEC). This is the highest-value gate.
# ---------------------------------------------------------------------------
[advisories]
version = 2
yanked = "deny"
# The vulnerabilities + unsound advisory in this graph are FIXED by dep bumps
# (url/idna >=1.0 for RUSTSEC-2024-0421, time >=0.3.47 for RUSTSEC-2026-0009,
# lru >=0.16.3 for RUSTSEC-2026-0002) — not ignored. The entries below are
# `unmaintained` advisories on TRANSITIVE deps whose own advisory states no safe
# upgrade exists, so there is nothing to bump to; we accept them with a note.
ignore = [
    "RUSTSEC-2025-0141", # bincode 1.3.3 unmaintained (transitive via hnsw_rs); upstream declared 1.3.3 the final release — no successor to upgrade to.
    "RUSTSEC-2025-0057", # fxhash unmaintained (transitive); no maintained drop-in in this graph.
    "RUSTSEC-2024-0436", # paste unmaintained (proc-macro, build-time only); advisory states no safe upgrade.
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained (folded into rustls-pki-types upstream; transitive) — no fix available.
]

# ---------------------------------------------------------------------------
# License policy. Enforced as a non-blocking check in CI for now (see
# audit.yml) until the allow-list / clarifications are tuned against the full
# dependency graph; then flip it to a hard gate.
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]
exceptions = []

# Some crypto crates (notably `ring`) carry their license in a file rather than
# an SPDX expression and need a `[[licenses.clarify]]` block with the correct
# `license-files` hash before the licenses check can resolve them. Add one after
# running `cargo deny check licenses` locally to read off the expected hash, then
# drop `continue-on-error` for the licenses step in .github/workflows/audit.yml.

# ---------------------------------------------------------------------------
# Dependency bans. Codify the rustls-only TLS policy that is otherwise enforced
# only by comments in Cargo.toml (no openssl-sys / native-tls in the tree).
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
# rustls-only policy for SHIPPED code. The single allowed exception is ort-sys's
# build-time binary downloader: `ort` (download-binaries) compiles `ureq`, which
# — only under cargo-deny's `all-features` — pulls the native-tls TLS stack.
# That is a BUILD dependency (fetches the ONNX Runtime at compile time) and is
# never linked into the shipped binaries, which stay rustls-only. `wrappers`
# permits the chain ureq -> native-tls -> openssl -> openssl-sys but keeps each
# of these crates denied anywhere else in the dependency graph.
deny = [
    { name = "native-tls", reason = "rustls-only; permitted solely as ort-sys's build-time `ureq` downloader", wrappers = ["ureq"] },
    { name = "openssl", reason = "rustls-only; permitted solely under build-time native-tls", wrappers = ["native-tls"] },
    { name = "openssl-sys", reason = "rustls-only; permitted solely under build-time native-tls/openssl", wrappers = ["native-tls", "openssl"] },
]

# ---------------------------------------------------------------------------
# Source allow-list: crates.io only.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
