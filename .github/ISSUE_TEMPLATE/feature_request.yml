name: Feature request
description: Suggest an idea or enhancement for origin
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. Focus on the "why" before the "how".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like origin to do? Sketch the behavior, flags, or API.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they fall short.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art in other harnesses (Claude Code, jcode, opencode), screenshots, etc.
