name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.83.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross (linux only)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked
      - name: Build
        shell: bash
        env:
          # NOTE: panic=abort is intentionally NOT set. It cannot be used here:
          # a crate in the graph (html2md) links the unwind panic runtime, and
          # forcing abort via the profile fails with "the linked panic runtime
          # `panic_unwind` is not compiled with this crate's panic strategy
          # `abort`" on every target (rebuilding std with abort needs nightly
          # -Z build-std). LTO + opt-level=z + strip provide the size win.
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          if [[ "${{ matrix.target }}" == *linux* ]]; then
            cross build -p origin-cli --release --target ${{ matrix.target }}
          else
            cargo build -p origin-cli --release --target ${{ matrix.target }}
          fi
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/origin$ext" "dist/origin-${{ matrix.target }}$ext"
      - name: Cosign keyless sign
        uses: sigstore/cosign-installer@v3
      - name: Sign
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          for f in dist/*; do
            cosign sign-blob --bundle "$f.sig" "$f"
          done
      - name: SLSA provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten
        run: |
          mkdir -p out
          find dist -type f -exec mv {} out/ \;
      - name: SHA256SUMS
        working-directory: out
        run: |
          # Hash the binaries only (skip cosign .sig bundles). The npm download
          # fallback verifies against this manifest.
          for f in origin-*; do
            case "$f" in
              *.sig) ;;
              *) sha256sum "$f" ;;
            esac
          done | tee SHA256SUMS
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

  npm-publish:
    name: npm publish
    needs: release
    runs-on: ubuntu-latest
    # Skip on forks (no NPM_TOKEN) and when no token is configured.
    if: ${{ github.repository == 'Kantosaurus/origin' }}
    permissions:
      contents: read
      id-token: write # required for `npm publish --provenance`
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Collect binaries
        run: |
          mkdir -p binaries
          # The platform binaries are the only assets the npm build needs.
          find dist -type f -name 'origin-*' ! -name '*.sig' -exec cp {} binaries/ \;
          ls -la binaries
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          node packaging/npm/scripts/build.mjs \
            --version "${{ steps.ver.outputs.version }}" \
            --binaries binaries \
            --publish --provenance
