name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc (gnu), not musl: ONNX Runtime (ort, via origin-mem) ships no
          # musl build and can't compile in the musl cross container. gnu links
          # glibc and runs on all mainstream Linux distros (not Alpine/static).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.83.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cross (aarch64 Linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
      - name: Build
        shell: bash
        env:
          # NOTE: panic=abort is intentionally NOT set. It cannot be used here:
          # a crate in the graph (html2md) links the unwind panic runtime, and
          # forcing abort via the profile fails with "the linked panic runtime
          # `panic_unwind` is not compiled with this crate's panic strategy
          # `abort`" on every target (rebuilding std with abort needs nightly
          # -Z build-std). LTO + opt-level=z + strip provide the size win.
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          # aarch64 Linux is cross-compiled with `cross`; x86_64 Linux builds
          # natively on the ubuntu runner; macOS/Windows build natively too.
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build -p origin-cli --release --target ${{ matrix.target }}
          else
            cargo build -p origin-cli --release --target ${{ matrix.target }}
          fi
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/origin$ext" "dist/origin-${{ matrix.target }}$ext"
      - name: Cosign keyless sign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          for f in dist/*; do
            cosign sign-blob --bundle "$f.sig" "$f"
          done
      - name: SLSA provenance attestation
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.83.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
      - name: Flatten
        run: |
          mkdir -p out
          find dist -type f -exec mv {} out/ \;
      - name: SHA256SUMS
        working-directory: out
        run: |
          # Hash the binaries only (skip cosign .sig bundles). The npm download
          # fallback verifies against this manifest.
          for f in origin-*; do
            case "$f" in
              *.sig) ;;
              *) sha256sum "$f" ;;
            esac
          done | tee SHA256SUMS
      - name: Stamp packaging templates (Homebrew / winget / AUR)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Build a {target -> sha256} manifest from the staged binaries, then
          # stamp the packaging templates so the formulae/manifests carry real
          # download URLs + checksums for this release.
          python3 - <<'PY'
          import hashlib, glob, json
          m = {}
          for f in glob.glob('out/origin-*'):
              if f.endswith('.sig'):
                  continue
              name = f.rsplit('/', 1)[-1][len('origin-'):]
              if name.endswith('.exe'):
                  name = name[:-4]
              with open(f, 'rb') as fh:
                  m[name] = hashlib.sha256(fh.read()).hexdigest()
          with open('manifest.json', 'w') as fh:
              json.dump(m, fh, indent=2)
          print(json.dumps(m, indent=2))
          PY
          cargo run -p xtask --locked -- release \
            --version "$version" \
            --manifest manifest.json \
            --out out/packaging
      - name: GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            out/origin-*
            out/SHA256SUMS
            out/packaging/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

  npm-publish:
    name: npm publish
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip on forks (no NPM_TOKEN) and when no token is configured.
    if: ${{ github.repository == 'Kantosaurus/origin' }}
    permissions:
      contents: read
      id-token: write # required for `npm publish --provenance`
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
      - name: Collect binaries
        run: |
          mkdir -p binaries
          # The platform binaries are the only assets the npm build needs.
          find dist -type f -name 'origin-*' ! -name '*.sig' -exec cp {} binaries/ \;
          ls -la binaries
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          node packaging/npm/scripts/build.mjs \
            --version "${{ steps.ver.outputs.version }}" \
            --binaries binaries \
            --publish --provenance
