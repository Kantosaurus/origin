name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc (gnu), not musl: ONNX Runtime (ort, via origin-mem) ships no
          # musl build and can't compile in the musl cross container. gnu links
          # glibc and runs on all mainstream Linux distros (not Alpine/static).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # aarch64 Linux/Windows build on NATIVE ARM64 runners (GA for public
          # repos) rather than cross-compiling: ONNX Runtime (ort, via
          # origin-mem) has no aarch64 prebuilt for this ort version, so it
          # statically compiles ORT from source — which fails to link in the
          # `cross` container (old sysroot: undefined __libc_single_threaded /
          # newer libstdc++ symbols) and produced no lib at all when x64->arm64
          # cross-compiling Windows (unresolved OrtGetApiBase). Native arm64
          # runners compile + link ORT with a modern toolchain, so the full trio
          # builds on every target.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # x86_64 macOS builds on a NATIVE Intel runner: ort rc.12 links ONNX
          # Runtime for Apple via an xcframework, which only resolves for the
          # host arch — cross-building x64 on the arm64 `macos-latest` runner
          # fails ("can't do xcframework linking for x86_64-apple-darwin").
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build
        shell: bash
        env:
          # NOTE: panic=abort is intentionally NOT set. It cannot be used here:
          # a crate in the graph (html2md) links the unwind panic runtime, and
          # forcing abort via the profile fails with "the linked panic runtime
          # `panic_unwind` is not compiled with this crate's panic strategy
          # `abort`" on every target (rebuilding std with abort needs nightly
          # -Z build-std). LTO + opt-level=z + strip provide the size win.
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          # Ship the runtime trio on every target: `origin` (CLI) plus the
          # SEPARATE `origin-daemon` binary the CLI spawns (required to stand up
          # the daemon) and `origin-supervisor` (restarts the daemon + consumes
          # the self-dev hot-reload exit-86 sentinel), co-located so the CLI's
          # sibling lookup (current_exe().parent()) resolves them. Every target
          # now builds NATIVELY on its own architecture's runner, so ONNX Runtime
          # (ort, via origin-mem) compiles + links cleanly everywhere.
          cargo build -p origin-cli -p origin-daemon -p origin-supervisor \
            --release --target ${{ matrix.target }}
      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          # Stage whatever was built for this target (the trio on native-arch
          # targets, `origin` alone on the two aarch64 cross targets). All are
          # named `<bin>-<triple>[.exe]` so the SHA256SUMS (`origin-*`), cosign
          # (`dist/*`), upload (`origin-*`), and npm collect (`origin-*`) steps
          # pick up every one. A binary not built for this target is skipped
          # (the npm assembler + cold-path downloader both tolerate a missing
          # daemon/supervisor for that platform).
          for b in origin origin-daemon origin-supervisor; do
            src="target/${{ matrix.target }}/release/$b$ext"
            if [[ -f "$src" ]]; then cp "$src" "dist/$b-${{ matrix.target }}$ext"; fi
          done
      # Cosign has no arm64-Windows binary (the installer errors "unsupported
      # architecture ARM64"), so skip cosign signing on that one target. Its
      # binaries still ship and are covered by SHA256SUMS (which is what the npm
      # download fallback verifies against).
      - name: Cosign keyless sign
        if: matrix.target != 'aarch64-pc-windows-msvc'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign
        if: matrix.target != 'aarch64-pc-windows-msvc'
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          for f in dist/*; do
            cosign sign-blob --bundle "$f.sig" "$f"
          done
      # Also skip SLSA attestation on arm64-Windows (same toolchain-support gap
      # as cosign); the binary ships + is covered by SHA256SUMS.
      - name: SLSA provenance attestation
        if: matrix.target != 'aarch64-pc-windows-msvc'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      - name: Flatten
        run: |
          mkdir -p out
          find dist -type f -exec mv {} out/ \;
      - name: SHA256SUMS
        working-directory: out
        run: |
          # Hash the binaries only (skip cosign .sig bundles). The npm download
          # fallback verifies against this manifest.
          for f in origin-*; do
            case "$f" in
              *.sig) ;;
              *) sha256sum "$f" ;;
            esac
          done | tee SHA256SUMS
      - name: Stamp packaging templates (Homebrew / winget / AUR)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Build a {target -> sha256} manifest from the staged binaries, then
          # stamp the packaging templates so the formulae/manifests carry real
          # download URLs + checksums for this release.
          python3 - <<'PY'
          import hashlib, glob, json
          m = {}
          for f in glob.glob('out/origin-*'):
              if f.endswith('.sig'):
                  continue
              name = f.rsplit('/', 1)[-1][len('origin-'):]
              if name.endswith('.exe'):
                  name = name[:-4]
              with open(f, 'rb') as fh:
                  m[name] = hashlib.sha256(fh.read()).hexdigest()
          with open('manifest.json', 'w') as fh:
              json.dump(m, fh, indent=2)
          print(json.dumps(m, indent=2))
          PY
          cargo run -p xtask --locked -- release \
            --version "$version" \
            --manifest manifest.json \
            --out out/packaging
      - name: Generate SBOM (CycloneDX)
        continue-on-error: true   # supplementary — never block a release
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --all --format json
          mkdir -p out/sbom
          find . -name '*.cdx.json' -not -path './target/*' -not -path './out/*' \
            -exec cp {} out/sbom/ \;
          ls -la out/sbom || true
      - name: GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            out/origin-*
            out/SHA256SUMS
            out/packaging/*
            out/sbom/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

  npm-publish:
    name: npm publish
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip on forks (no NPM_TOKEN) and when no token is configured.
    if: ${{ github.repository == 'Kantosaurus/origin' }}
    permissions:
      contents: read
      id-token: write # required for `npm publish --provenance`
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      - name: Collect binaries
        run: |
          mkdir -p binaries
          # The platform binaries are the only assets the npm build needs.
          find dist -type f -name 'origin-*' ! -name '*.sig' -exec cp {} binaries/ \;
          ls -la binaries
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          # Package family defaults to the scoped `@kantosaurus/origin`
          # (lib/platform.js); the unscoped `originx*` names tripped npm spam
          # detection. Set ORIGIN_NPM_PREFIX here only to override that default.
        run: |
          node packaging/npm/scripts/build.mjs \
            --version "${{ steps.ver.outputs.version }}" \
            --binaries binaries \
            --publish --provenance
