name: Docs
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]

permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress Pages deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          # Tooling job: use stable so `cargo install mdbook` (latest) works.
          # The repo's MSRV (1.83) is gated by the CI workflow, not here.
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install mdbook
        run: cargo install mdbook --locked
      - name: Build site
        run: mdbook build docs/site
      - name: Build manpages
        run: cargo run -p xtask --locked -- manpages --out target/manpages
      - name: Upload artifact (gh-pages on dev/main)
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/site/book
  deploy:
    # Publish from the active default branch (dev).
    if: github.ref == 'refs/heads/dev'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
