name: Docs
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]

permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress Pages deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install mdbook
        # Pin to the last 0.4.x that builds on the repo MSRV (1.83). Although the
        # step requests `stable` above, the root rust-toolchain.toml pins 1.83 and
        # takes precedence in this working directory, so an unpinned
        # `cargo install mdbook` pulls a release that needs rustc >= 1.88 (e.g.
        # 0.5.x, edition2024) and fails. Pinning keeps the install on a 1.83-safe
        # version; bump it when the workspace MSRV moves.
        run: cargo install mdbook --locked --version 0.4.40
      - name: Build site
        run: mdbook build docs/site
      - name: Build manpages
        run: cargo run -p xtask --locked -- manpages --out target/manpages
      - name: Upload artifact (gh-pages on dev/main)
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/site/book
  deploy:
    # Publish from the active default branch (dev).
    if: github.ref == 'refs/heads/dev'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
