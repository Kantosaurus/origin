name: Fuzz
on:
  schedule:
    - cron: '0 6 * * *'   # nightly at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          - ipc_frame
          - fastcdc_boundary
          - anthropic_stream
          - openai_stream
          - streaming_json
          - tool_use_parser
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore corpus
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: crates/origin-daemon/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Run fuzz target (5 min)
        working-directory: crates/origin-daemon/fuzz
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=300 -timeout=15
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: crates/origin-daemon/fuzz/artifacts/${{ matrix.target }}
